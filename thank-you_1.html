  !function(f,b,e,v,n,t,s)

  // Only fire Purchase if PayPal actually redirected here with real
  // transaction proof (token + PayerID in the URL). A direct/random

  // NOT have these params, so it will NOT count as a fake purchase.
  (function () {
    var params = new URLSearchParams(window.location.search);
    var hasToken = params.has('token');
    var hasPayerID = params.has('PayerID');

    // De-dupe: if someone refreshes this exact confirmed URL, don't fire twice.
    var alreadyFired = sessionStorage.getItem('purchase_pixel_fired');

    if (hasToken && hasPayerID && !alreadyFired) {
      fbq('track', 'Purchase', {value: 89.00, currency: 'USD'});
      sessionStorage.setItem('purchase_pixel_fired', '1');
    }
  })();
  </script>
